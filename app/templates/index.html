{% extends "base_app.html" %}

{% block title %}Home{% endblock %}

{% block head %}
<script type="module" src="../static/time.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script type="module"
        src="{{ url_for('static', filename='home.js') }}">
</script>
{% endblock %}

{% block content %}


<!-- ================= Main ================= -->
<div class="container">
    <!--Time-->
    <div class="row">
        <div class="col-12 col-lg-6 my-5 d-flex justify-content-center">
            <div class="align-self-center">

                {% if running_timer_id %}
                <div id="running-timer" data-started-time="{{ started_time }}" data-session-id="{{ running_timer_id }}">
                </div>
                {% endif %}

                <div class="chart" id="chart"></div>
                <div class="legend" id="legend"></div>
                <!--legand-->
            </div>
        </div>

        <!--Tasks list-->
        <div class="col-12 col-lg-6 my-5">
            <div>
                <h2 class="text-light">Your Tasks</h2>

                <!--Add task butto, Cros Icon-->
                <a class="btn btn-outline-light text-decoration-none float-end" href="{{ url_for('main.add_task') }}">
                    <i class="bi bi-plus-square"></i>
                </a>

            </div>
            <ul class="list-group my-5">
                {% for task in tasks %}
                <li class="list-group-item"
                    style="color: {{task_text_color(task.color)}}; background-color: {{task.color}};">
                    {{task.task_text}}

                    <!--complete button-->
                    <div class="btn-group float-end">
                        <form action="{{ url_for('main.complete_task', task_id=task.id) }}" method="post"
                            style="display:inline;">
                            <button type="submit" style="background-color: transparent;
                                 color: {{ task_text_color(task.color) }};
                                 margin: 1px;
                                 border: none;">
                                <i class="bi bi-check2-square"></i>
                            </button>
                        </form>

                        <!--Edit button-->
                        <a href="/edit_task/{{task.id}}" type="button" style="background-color: transparent; 
                            color: {{task_text_color(task.color)}};
                            margin: 1px; 
                            border-color: transparent;">
                            <i class="bi bi-pencil-square"></i>
                        </a>

                        <!--Delete button-->
                        <form action="{{ url_for('main.delete_task', task_id=task.id) }}" method="post"
                            style="display:inline;">
                            <button type="submit" style="background-color: transparent;
                                 color: {{ task_text_color(task.color) }};
                                 margin: 1px;
                                 border: none;">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>

                        <!--timer button-->
                        <button id="timer_button" class="timer_button ms-1" style="background-color: transparent;
                                 color: {{ task_text_color(task.color) }};
                                 margin: 1px;
                                 border: none;" onclick="startTimer({{ task.id }})">
                            <i class="bi bi-stopwatch"></i>
                            Start
                        </button>
                    </div>
                </li>
                {% endfor %}
        </div>
        </ul>
    </div>
</div>
</div>
{% endblock %}
{% block scripts %}
    <script src="{{ url_for('static', filename='script.js')}}"></script>
{% endblock %}
